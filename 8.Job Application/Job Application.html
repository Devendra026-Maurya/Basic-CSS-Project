<!DOCTYPE html>
<html lang="en">
<head>
<title>Job Application</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="styles.css" rel="stylesheet"/>
</head>


<body>
	<div class="container">
		<div class="apply_box">
			<h1>Job Application <span class="title_small">(web)</span></h1>
			<form> 
			<div class="form_container">
				<div class="form_control">
				<label for="first_name">First Name</label>
				<input type="text" id="first_name" name="first_name" placeholder="Enter First Name..."/>
				</div>
				
				<div class="form_control">
				<label for="last_name">Last Name</label>
				<input type="text" id="last_name" name="last_name" placeholder="Enter Last Name..."/>
				</div>
				
				<div class="form_control">
				<label for="email">Email</label>
				<input type="email" id="email" name="email" placeholder="Enter email.."/>
				</div>
				
				<div class="form_control">
				<label for="job_role">Job Role</label>
				 <select id="job_role" name="job_role">
					<option value="">Select Job Role</option>
					<option value="frontend">Frontend Developer</option>
					<option value="backend">Backend Developer</option>
					<option value="full_stack">Full Stack Developer</option>
					<option value="ui_ux">UI UX Designer</option>
				 </select>
				</div>
				
				<div class="textarea_control">
				<label for="address">Address</label>
				<textarea id="address" name="address" rows="4" cols="50" placeholder="Enter Address"></textarea>
				</div>
				
				<div class="form_control">
				<label for="city">City</label>
				<input type="text" id="city" name="city" placeholder="Enter City Name..."/>
				</div>
				
				<div class="form_control">
				<label for="pincode">Pin Code</label>
				<input type="number" id="pincode" name="pincode" placeholder="Enter Pin Code..."/>
				</div>
				
				<div class="form_control">
				<label for="date">Start Date</label>
				<input type="date" value="2025-01-10" id="date" name="date" placeholder="Enter date..."/>
				</div>
				
				<div class="form_control">
				<label for="upload">Upload Your CV</label>
				<input type="file" id="upload" name="upload" placeholder="Enter Last Name..."/>
				</div>
			 
			
			</div>
			<div class="button_container">
			<button type="submit">Apply Now</button>
			</div>
			</form>
		
		</div>
	</div>

</body>
</html>
