<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>  
<body>
    <h1>BIO DATA</h1>

    <div id="personal_data">
    
    <form>
        
    <fieldset>
        <legend>PERSONAL DATA</legend>
   <div class="form-group">
    <label class="form-label" for="name">Name:</label>
    <input type="text" id="name" class="underline-input underlinetext1" placeholder="Enter your name">
   </div>

   <div class="form-group">
    <label class="form-label" for="present_address">Present Address:</label>
    <input type="text" id="present_address" class="underline-input underlinetext2" placeholder="Enter your Present Address">
   </div>

   <div class="form-group">
    <label class="form-label" for="permanent_address">Permanent Address:</label>
    <input type="text" id="permanent_address" class="underline-input underlinetext3" placeholder="Enter your Permanent Address">
   </div>

   <div class="form-group">
    <label class="form-label" for="emails">Email Address:</label>
    <input type="email" id="emails" class="underline-input underlinetext4" placeholder="Enter your Email Address">
   </div>

   <div class="form-group">
    <label class="form-label" for="mobno">Mobile Number:</label>
    <input type="tel" id="mobno" class="underline-input underlinetext5" placeholder="Enter your Mobile No">
   </div>

   <div class="form-group">
    <label class="form-label" for="telno">Telephone Number:</label>
    <input type="tel" id="telno" class="underline-input underlinetext6" placeholder="Enter your Telephone No">
   </div>

   <div class="form-group">
    <label class="form-label" for="dob">Date of Birth:</label>
    <input type="date" id="dob" class="underline-input underlinetext7" placeholder="Enter your Date of Birth">
    
    <label class="form-label place" for="pob">Place of Birth:</label>
    <input type="text" id="pob" class="underline-input underlinetext8" placeholder="Enter your place of Birth">
   </div>

   <div class="form-group">
    <label class="form-label" for="ages">Age:</label>
    <input type="number" min="18" max="50" id="ages" class="underline-input underlinetext9" placeholder="Enter your Age">
    
    <label class="form-label" for="sexs">Sex:</label>
    <input type="text" id="sexs" class="underline-input underlinetext9" placeholder="Enter your sex">
   </div>

   <div class="form-group-photo">
    <img src="Person.png" alt="profile-photo">
   </div>

   <div class="form-group">
    <label class="form-label" for="Citizenship">Citizenship:</label>
    <input type="text" id="Citizenship" class="underline-input underlinetext10" placeholder="e.g Indian">
    
    <label class="form-label" for="Nationality">Nationality:</label>
    <input type="text" id="Nationality" class="underline-input underlinetext10" placeholder="e.g.Indian">
   </div>


   <div class="form-group">
     <label class="form-label" for="weight">Weight:</label>
    <input type="number" min="0" max="100" id="weight" class="underline-input underlinetext11" placeholder="Enter your weight">
    
     <label class="form-label" for="height">Height:</label>
    <input type="number" min="1.0" max="6.0" id="height" class="underline-input underlinetext11" placeholder="Enter your height">
    
   </div>

   <div class="form-group">
     <label class="form-label" for="civilstatus:">Civil Status:</label>
   <input type="text" id="civilstatus:" class="underline-input underlinetext12" placeholder="e.g Single,Married,Divorced,Widowed,Civil Partnership etc.">

   </div>


   <div class="form-group">
     <label class="form-label" for="spouse">Spouse:</label>
   <input type="text" id="spouse" class="underline-input underlinetext13" placeholder="Enter your spouse name">

     <label class="form-label" for="occupation">Occupation:</label>
   <input type="text" id="occupation" class="underline-input underlinetext13" placeholder="e.g.Engineer,Doctor,Teacher etc.">
    
   </div>

   <div class="form-group">
     <label class="form-label" for="child">Name of Children:</label>
   <input type="text" id="child" class="underline-input underlinetext14" placeholder="Enter your child name">

     <label class="form-label" for="child-dob">Date of Birth:</label>
    <input type="date" id="child-dob" class="underline-input underlinetext14" placeholder="Enter your Date of Birth">
    <br>
    <label class="form-label child-name" for="child">          :</label>
   <input type="text" id="child" class="underline-input underlinetext14" placeholder="Enter your child name">

     <label class="form-label child-birth" for="child-dob">     :</label>
    <input type="date" id="child-dob" class="underline-input underlinetext14" placeholder="Enter your Date of Birth">

    <br>
    <label class="form-label child-name" for="child">          :</label>
   <input type="text" id="child" class="underline-input underlinetext14" placeholder="Enter your child name">

     <label class="form-label child-birth" for="child-dob">     :</label>
    <input type="date" id="child-dob" class="underline-input underlinetext14" placeholder="Enter your Date of Birth">
   </div>


   <div class="form-group">
     <label class="form-label" for="father">Father's Name:</label>
   <input type="text" id="fathers" class="underline-input underlinetext15" placeholder="Enter your father name">

     <label class="form-label" for="father-occup">Occupation:</label>
    <input type="text" id="father-occup" class="underline-input underlinetext15" placeholder="Enter Occupation">
   </div>

    <div>
    <label class="form-label" for="mother">Mother's Name:</label>
   <input type="text" id="child" class="underline-input underlinetext15" placeholder="Enter your mother name">

     <label class="form-label" for="mother-occup">Occupation:</label>
    <input type="text" id="mother-occup" class="underline-input underlinetext15" placeholder="Enter Occupation">
   </div>
    <br>
    <div class="form-group">
     <label class="form-label" for="Language">Language or dialect spoken and written:</label>
   <input type="text" id="Language" class="underline-input underlinetext16" placeholder="e.g Hindi,English,Marathi..etc.">

   </div>

   <div class="form-group">
     <label class="form-label" for="emergency">Person to be contacted in case of emergency:</label>
    <input type="tel" id="emergency" class="underline-input underlinetext17" placeholder="Enter emergency No.">
    
     <label class="form-label" for="Contact">Contact Number:</label>
    <input type="tel" id="Contact" class="underline-input underlinetext17" placeholder="Enter personal No.">
    
   </div>

   <br>
   <div><h3>EDUCATIONAL BACKGROUND:</h3></div>

    <div class="form-group">
     <label class="form-label" for="junior">Elementary:</label>
   <input type="text" id="junior" class="underline-input underlinetext18" placeholder="Enter your Elementary name ">

     <label class="form-label" for="Graduated-one">Year Graduated:</label>
    <input type="number" id="Graduated-one" class="underline-input underlinetext18" placeholder="year e.g 2010">
   </div>

   <div class="form-group">
     <label class="form-label" for="senior">High School:</label>
   <input type="text" id="senior" class="underline-input underlinetext19" placeholder="Enter your School name ">

     <label class="form-label" for="Graduated-two">Year Graduated:</label>
    <input type="number" id="Graduated-two" class="underline-input underlinetext19" placeholder="year e.g 2010">
   </div>

    <div class="form-group">
     <label class="form-label" for="college">Vocational:</label>
   <input type="text" id="college" class="underline-input underlinetext20" placeholder="Enter your College name ">

     <label class="form-label" for="Graduated-three">Year Graduated:</label>
    <input type="number" id="Graduated-three" class="underline-input underlinetext20" placeholder="year e.g 2010">
   </div>
   
    <div class="form-group">
     <label class="form-label" for="high-degree">College:</label>
   <input type="text" id="high-degree" class="underline-input underlinetext21" placeholder="Enter your Degree college name ">

     <label class="form-label" for="Graduated-four">Year Graduated:</label>
    <input type="number" id="Graduated-four" class="underline-input underlinetext21" placeholder="year e.g 2010">
   </div>

    <div class="form-group">
     <label class="form-label" for="recieve-degree">Degree Received:</label>
   <input type="text" id="recieve-degree" class="underline-input underlinetext22" placeholder="Enter university Name">
   </div>

   <div class="form-group">
     <label class="form-label" for="skill">Special Skills:</label>
   <input type="text" id="skill" class="underline-input underlinetext23" placeholder="Enter your skills ">
  
   </div>
   

   <br>
   <div><h3>EMPLOYMENT RECORD:</h3></div>

   <div class="form-group">
     <label class="form-label" for="conpany1">Company Name:</label>
   <input type="text" id="conpany1" class="underline-input underlinetext24" placeholder="Enter your organisation Name ">
  </div>
   
  <div class="form-group">
     <label class="form-label" for="position1">Position:</label>
   <input type="text" id="position1" class="underline-input underlinetext25" placeholder="Enter your position ">

    <label class="form-label" for="form1">From:</label>
    <input type="text" id="form1" class="underline-input underlinetext25" placeholder="Month & year e.g Feb 2010">

    <label class="form-label" for="to1">To:</label>
    <input type="text" id="to1" class="underline-input underlinetext25" placeholder="Month & year e.g Feb 2012">
   </div>

    <div class="form-group">
     <label class="form-label" for="conpany2">Company Name:</label>
   <input type="text" id="conpany2" class="underline-input underlinetext24" placeholder="Enter your organisation Name ">
  </div>

   <div class="form-group">
     <label class="form-label" for="position2">Position:</label>
   <input type="text" id="position2" class="underline-input underlinetext25" placeholder="Enter your position ">

    <label class="form-label" for="form2">From:</label>
    <input type="text" id="form2" class="underline-input underlinetext25" placeholder="Month & year e.g Feb 2010">

    <label class="form-label" for="to2">To:</label>
    <input type="text" id="to2" class="underline-input underlinetext25" placeholder="Month & year e.g Feb 2012">
   </div>

   <div id="hereby"><p><i>I hereby certify that the above information is true and correct to the best of my knowledge and belief.</i></p>
   <hr>
   <h4>SIGNATURE OVER PRINTED NAME</h4>

</div>

   </fieldset>
</form>
</div>



    

</body>
</html>
